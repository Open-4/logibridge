version: '3.8'

services:
  server:
    build: ./data-pipeline
    ports:
      - "8000:8000"
    volumes:
      - ./data-pipeline/output:/app/output
    environment:
      - LOGIBRIDGE_JWT_SECRET=${JWT_SECRET:-change_this_in_production}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-etc:/etc/letsencrypt
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  certbot-www:
  certbot-etc:
