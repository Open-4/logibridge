version: '3.8'

services:
  server:
    build: ./data-pipeline
    ports:
      - "8000:8000"
    volumes:
      - ./data-pipeline/output:/app/output
    environment:
      - LOGIBRIDGE_JWT_SECRET=${JWT_SECRET:-change_this_in_production}
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # certbot 证书持久化
      - certbot-www:/var/www/certbot
      - certbot-etc:/etc/letsencrypt
    depends_on:
      - server
    restart: unless-stopped

volumes:
  certbot-www:
  certbot-etc:
