# ── LogiBridge Nginx 配置（生产环境） ───────────────────────────────
# 域名: znkfhyq.xyz
# 部署方式: Docker Compose（nginx:alpine）
#
# 首次部署后执行以下命令获取 HTTPS 证书：
#   docker compose exec web certbot --nginx -d znkfhyq.xyz -d www.znkfhyq.xyz
#
# 或者手动配置 SSL 证书后取消下方 443 块的注释。

server {
    listen 80;
    server_name znkfhyq.xyz www.znkfhyq.xyz;

    # Let's Encrypt / ACME 验证（certbot 需要）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api {
        proxy_pass http://server:8000/api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}

