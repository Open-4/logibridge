# ── LogiBridge Nginx 配置 ──────────────────────────────────────────
#
# MVP 阶段仅使用 HTTP（80 端口）。
# 如需 HTTPS，可选择以下方案：
#
# 方案 A：Nginx + certbot（自行管理证书）
#   取消下方 443 server 块的注释，将 server_name 改为实际域名，
#   并配置 ssl_certificate 和 ssl_certificate_key 路径。
#
# 方案 B：Caddy（自动 Let's Encrypt）
#   用 Caddyfile 替代本配置：
#     example.com {
#       reverse_path /api http://server:8000
#       root * /usr/share/nginx/html
#       file_server
#     }
#   Caddy 会自动申请和续签 TLS 证书。

server {
    listen 80;
    server_name localhost;

    location /api {
        proxy_pass http://server:8000/api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}

