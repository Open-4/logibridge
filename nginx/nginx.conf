# ── LogiBridge Nginx 配置（生产环境） ───────────────────────────────
# 域名: znkfhyq.xyz
# 部署方式: Docker Compose（nginx:alpine）
#
# 首次部署后执行以下命令获取 HTTPS 证书：
#   docker compose exec web certbot --nginx -d znkfhyq.xyz -d www.znkfhyq.xyz

server {
    listen 80;
    server_name znkfhyq.xyz www.znkfhyq.xyz;

    # Let's Encrypt / ACME 验证（certbot 需要）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其余 HTTP 请求重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name znkfhyq.xyz www.znkfhyq.xyz;

    ssl_certificate     /etc/letsencrypt/live/znkfhyq.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/znkfhyq.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /api {
        proxy_pass http://server:8000/api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
